services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # プロジェクト直下はバインドしない（ホストに node_modules を作らない）
      # .next は永続化しない（旧ビルドが残ると本番・開発とも一覧が更新されない）
      - ./app:/app/app
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./next.config.ts:/app/next.config.ts:ro
      - ./next-env.d.ts:/app/next-env.d.ts:ro
      - kids_kanji_node_modules:/app/node_modules
    command: npm run dev

volumes:
  kids_kanji_node_modules:
