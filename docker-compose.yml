services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # プロジェクト直下はバインドしない（ホストに node_modules / .next を作らない）
      - ./app:/app/app
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./next.config.ts:/app/next.config.ts:ro
      - ./next-env.d.ts:/app/next-env.d.ts:ro
      - kids_kanji_node_modules:/app/node_modules
      - kids_kanji_next:/app/.next
    command: npm run dev

volumes:
  kids_kanji_node_modules:
  kids_kanji_next:
